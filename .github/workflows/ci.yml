name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  rust:
    name: Rust (fmt, clippy, test, audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: WireSentinel

      - uses: actions/checkout@v4
        with:
          repository: zerofrip/WireSentinel-Mixnet
          path: WireSentinel-Mixnet

      - uses: actions/checkout@v4
        with:
          repository: zerofrip/WireSentinel-Anonymity
          path: WireSentinel-Anonymity

      - uses: actions/checkout@v4
        with:
          repository: zerofrip/WireSentinel-ZTNA
          path: WireSentinel-ZTNA

      - uses: actions/checkout@v4
        with:
          repository: zerofrip/WireSentinel-SSE
          path: WireSentinel-SSE

      - uses: actions/checkout@v4
        with:
          repository: zerofrip/WireSentinel-XDR
          path: WireSentinel-XDR

      - uses: actions/checkout@v4
        with:
          repository: zerofrip/WireSentinel-Ndis
          path: WireSentinel-Ndis

      - uses: actions/checkout@v4
        with:
          repository: zerofrip/WireSentinel-Kernel
          path: WireSentinel-Kernel

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: WireSentinel

      - name: cargo fmt
        working-directory: WireSentinel
        run: cargo fmt --all -- --check

      - name: cargo clippy
        working-directory: WireSentinel
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo test
        working-directory: WireSentinel
        run: cargo test --workspace

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: cargo audit
        working-directory: WireSentinel
        run: cargo audit

  frontend:
    name: UI (npm build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: WireSentinel/ui
    steps:
      - uses: actions/checkout@v4
        with:
          path: WireSentinel

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: WireSentinel/ui/package-lock.json

      - name: npm ci
        run: npm ci

      - name: npm run build
        run: npm run build

  installer-validate:
    name: Installer validation (static)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: WireSentinel

      - name: Install PowerShell
        run: |
          sudo apt-get update
          sudo apt-get install -y powershell

      - name: validate.ps1 (token checks, skip file refs)
        working-directory: WireSentinel
        run: pwsh -File installer/tests/validate.ps1 -SkipFileRefs

      - name: Pester installer e2e (static)
        working-directory: WireSentinel
        run: pwsh -NoProfile -File installer/tests/run-pester-ci.ps1

  windows-cross:
    name: Windows cross-check (x64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: WireSentinel

      - uses: actions/checkout@v4
        with:
          repository: zerofrip/WireSentinel-Mixnet
          path: WireSentinel-Mixnet

      - uses: actions/checkout@v4
        with:
          repository: zerofrip/WireSentinel-Anonymity
          path: WireSentinel-Anonymity

      - uses: actions/checkout@v4
        with:
          repository: zerofrip/WireSentinel-ZTNA
          path: WireSentinel-ZTNA

      - uses: actions/checkout@v4
        with:
          repository: zerofrip/WireSentinel-SSE
          path: WireSentinel-SSE

      - uses: actions/checkout@v4
        with:
          repository: zerofrip/WireSentinel-XDR
          path: WireSentinel-XDR

      - uses: actions/checkout@v4
        with:
          repository: zerofrip/WireSentinel-Ndis
          path: WireSentinel-Ndis

      - uses: actions/checkout@v4
        with:
          repository: zerofrip/WireSentinel-Kernel
          path: WireSentinel-Kernel

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: WireSentinel

      - name: Install cargo-xwin
        run: cargo install cargo-xwin --locked

      - name: cargo check (x86_64-pc-windows-msvc)
        working-directory: WireSentinel
        run: cargo xwin check --workspace --target x86_64-pc-windows-msvc
        env:
          XWIN_ACCEPT_LICENSE: "1"

  windows-arm64:
    name: Windows ARM64 check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: WireSentinel

      - uses: actions/checkout@v4
        with:
          repository: zerofrip/WireSentinel-Mixnet
          path: WireSentinel-Mixnet

      - uses: actions/checkout@v4
        with:
          repository: zerofrip/WireSentinel-Anonymity
          path: WireSentinel-Anonymity

      - uses: actions/checkout@v4
        with:
          repository: zerofrip/WireSentinel-ZTNA
          path: WireSentinel-ZTNA

      - uses: actions/checkout@v4
        with:
          repository: zerofrip/WireSentinel-SSE
          path: WireSentinel-SSE

      - uses: actions/checkout@v4
        with:
          repository: zerofrip/WireSentinel-XDR
          path: WireSentinel-XDR

      - uses: actions/checkout@v4
        with:
          repository: zerofrip/WireSentinel-Ndis
          path: WireSentinel-Ndis

      - uses: actions/checkout@v4
        with:
          repository: zerofrip/WireSentinel-Kernel
          path: WireSentinel-Kernel

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-pc-windows-msvc

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: WireSentinel

      - name: Install cargo-xwin
        run: cargo install cargo-xwin --locked

      - name: cargo check (aarch64-pc-windows-msvc)
        working-directory: WireSentinel
        run: cargo xwin check --workspace --target aarch64-pc-windows-msvc
        env:
          XWIN_ACCEPT_LICENSE: "1"
